name: Release

on:
  workflow_dispatch:
    inputs:
      release_number:
        description: "Release number, e.g. 0.0.8"
        required: true
      target_branch:
        description: "Branch to release from"
        required: true
        default: "main"

permissions:
  contents: write

env:
  XCF_NAME: Shared
  XCF_GRADLE_TASK: umbrella:assembleSharedXCFramework
  XCF_OUTPUT_DIR: umbrella/build/XCFrameworks/release

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Prepare Release
        id: release
        shell: bash
        env:
          RELEASE_NUMBER: ${{ inputs.release_number }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_NUMBER" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release number must be semver-like, e.g. 0.0.8 or 0.0.8-beta.1" >&2
            exit 1
          fi

          if ! git check-ref-format --branch "$TARGET_BRANCH" >/dev/null; then
            echo "Invalid target branch: $TARGET_BRANCH" >&2
            exit 1
          fi

          tag_name="v${RELEASE_NUMBER}"
          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            echo "Tag ${tag_name} already exists locally" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists on origin" >&2
            exit 1
          fi

          if [[ ! -f gradle.properties ]]; then
            echo "gradle.properties not found" >&2
            exit 1
          fi
          if ! grep -qE '^version[[:space:]]*=' gradle.properties; then
            echo "version property missing in gradle.properties" >&2
            exit 1
          fi

          awk -v version="$RELEASE_NUMBER" '
            /^version[[:space:]]*=/ {
              print "version=" version
              next
            }
            { print }
          ' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties

          if git diff --quiet -- gradle.properties; then
            echo "gradle.properties already has version ${RELEASE_NUMBER}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${RELEASE_NUMBER}"
          git push origin "HEAD:${TARGET_BRANCH}"
          git tag -a "$tag_name" -m "$tag_name"
          git push origin "$tag_name"

          echo "version=$RELEASE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag-name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build XCFramework
        run: ./gradlew $XCF_GRADLE_TASK --stacktrace -Dorg.gradle.jvmargs="-Xmx6144m -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx6144m"

      - name: Package XCFramework
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          tag_name="${{ steps.release.outputs.tag-name }}"
          archive_name="${XCF_NAME}-${version}.xcframework.zip"
          output_dir="$XCF_OUTPUT_DIR"
          cd "$output_dir"
          rm -f "${XCF_NAME}.xcframework.zip" "$archive_name"
          zip -r "$archive_name" "${XCF_NAME}.xcframework"

          echo "archive-path=$output_dir/$archive_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag-name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.package.outputs.tag-name }}
          name: Shared XCFramework ${{ steps.package.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.package.outputs.version, '-') }}
          make_latest: ${{ !contains(steps.package.outputs.version, '-') }}
          files: ${{ steps.package.outputs.archive-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
